<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills Section</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #f1f5f2, #6c6c6c);
        color: #e5e7eb;
        padding: 50px;
        display: flex;
        justify-content: center;
    }

    .skills-container {
        width: 900px;
        padding: 40px;
        border-radius: 16px;

        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);

        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    h1 {
        text-align: center;
        font-size: 36px;
        margin-bottom: 30px;
        color: #5d4037;
    }

    .skill {
        margin-bottom: 20px;
    }

    .skill-name {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        font-size: 15px;
        color: #666;
    }

    .bar {
        width: 100%;
        height: 10px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        overflow: hidden;
    }

    .progress {
        height: 100%;
        border-radius: 10px;
        background: linear-gradient(90deg, #3b82f6, #60a5fa);
    }

    .uiux { width: 85%; }
    .html { width: 90%; }
    .excel { width: 75%; }
    .python { width: 80%; }
    .cpp { width: 70%; }
    .ai { width: 85%; }
    .css { width: 90%; }

</style>

</head>

<body>

<div class="skills-container">

    <h1>My Skills</h1>

    <div class="skill">
        <div class="skill-name">
            <span>UI/UX Design</span>
            <span>85%</span>
        </div>
        <div class="bar"><div class="progress uiux"></div></div>
    </div>

    <div class="skill">
        <div class="skill-name">
            <span>Web Development (HTML)</span>
            <span>90%</span>
        </div>
        <div class="bar"><div class="progress html"></div></div>
    </div>

    <div class="skill">
        <div class="skill-name">
            <span>Data Analysis (Excel)</span>
            <span>75%</span>
        </div>
        <div class="bar"><div class="progress excel"></div></div>
    </div>

    <div class="skill">
        <div class="skill-name">
            <span>Python</span>
            <span>80%</span>
        </div>
        <div class="bar"><div class="progress python"></div></div>
    </div>

    <div class="skill">
        <div class="skill-name">
            <span>C++</span>
            <span>70%</span>
        </div>
        <div class="bar"><div class="progress cpp"></div></div>
    </div>

    <div class="skill">
        <div class="skill-name">
            <span>AI Prompting & AI/ML Tools</span>
            <span>85%</span>
        </div>
        <div class="bar"><div class="progress ai"></div></div>
    </div>

    <div class="skill">
        <div class="skill-name">
            <span>CSS</span>
            <span>90%</span>
        </div>
        <div class="bar"><div class="progress css"></div></div>
    </div>

</div>

</body>
</html>
