<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download CV</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #f1f5f2, #666);
        font-family: Arial, sans-serif;
    }

    .container {
        text-align: center;
        padding: 50px;
        border-radius: 15px;
        background: rgba(255,255,255,0.06);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    h1 {
        color: #666;
        margin-bottom: 10px;
    }

    p {
        color: #cbd5e1;
        margin-bottom: 25px;
    }

    .btn {
        padding: 12px 25px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: #1d4ed8;
        transform: translateY(-2px);
    }
</style>

</head>

<body>

<div class="container">
    <h1>My CV</h1>
    <p>Click below to download my resume</p>

    <button class="btn" onclick="downloadCV()">Download CV</button>
</div>

<script>
    function downloadCV() {
        
        const link = document.createElement('a');

       
        link.href = 'cv.pdf';

      
        link.download = 'My_CV.pdf';

       
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
