<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Info</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #f1f5f2, #666);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 40px;
        color: #e5e7eb;
    }

    .contact-box {
        width: 700px;
        padding: 40px;
        border-radius: 16px;

        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);

        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        text-align: center;
    }

    h1 {
        font-size: 34px;
        margin-bottom: 30px;
        color: #5d4037;
    }

    .info {
        margin: 20px 0;
        font-size: 16px;
        color: #d1d5db;
        line-height: 1.8;
    }

    .info strong {
        color: #93c5fd;
    }

    .line {
        width: 100%;
        height: 2px;
        background: #545252;
        margin-top: 25px;
        border-radius: 2px;
    }

</style>

</head>

<body>

<div class="contact-box">

    <h1>Contact Me</h1>

    <div class="info">
        <p><strong>Email:</strong> samarth.tanpure24@sanjivani.edu.in</p>
        <p><strong>Mobile:</strong> +91 74105 09563</p>
        <p><strong>Location:</strong>rahuri,a.nagar,maharastra,india</p>
    </div>

    <div class="line"></div>

</div>

</body>
</html>
